version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: precept
      POSTGRES_USER: precept
      POSTGRES_PASSWORD: precept
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U precept"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py create_schemas &&
             python manage.py makemigrations &&
             python manage.py migrate contenttypes --database=infra &&
             python manage.py migrate auth --database=infra &&
             python manage.py migrate --database=default &&
             python manage.py migrate --database=infra &&
             python manage.py backfill_whatsapp_accounts &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - dkim_keys:/etc/opendkim/keys:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=precept
      - POSTGRES_USER=precept
      - POSTGRES_PASSWORD=precept
      - REDIS_URL=redis://redis:6379/0
      - REDIS_SESSIONS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - POSTFIX_HOST=postfix
      - POSTFIX_PORT=25

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=precept
      - POSTGRES_USER=precept
      - POSTGRES_PASSWORD=precept
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - POSTFIX_HOST=postfix
      - POSTFIX_PORT=25

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=precept
      - POSTGRES_USER=precept
      - POSTGRES_PASSWORD=precept
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/1

  channels:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=precept
      - POSTGRES_USER=precept
      - POSTGRES_PASSWORD=precept
      - REDIS_URL=redis://redis:6379/0

  postfix:
    build:
      context: ./docker/postfix
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN:-}
      - DKIM_SELECTOR=${DKIM_SELECTOR:-mail}
    volumes:
      - dkim_keys:/etc/opendkim/keys

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://precept.online/api
        - NEXT_PUBLIC_WS_URL=wss://precept.online/ws
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://precept.online/api
      - NEXT_PUBLIC_WS_URL=wss://precept.online/ws

volumes:
  postgres_data:
  dkim_keys:
